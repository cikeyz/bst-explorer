<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeSearch.bin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%236C5CE7' d='M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z M7 9h5 M9.5 6.5v5'/></svg>" type="image/svg+xml">
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Binary Search Tree</h1>
            </div>
        </header>
        
        <div class="main-content">
            <div class="visualization">
                <div id="tree-visualization"></div>
                <div class="controls">
                    <div class="input-group">
                        <input type="text" id="numbers-input" placeholder="Enter up to 30 integers (space-separated)">
                    </div>
                    <div class="button-group">
                        <button id="generate-random" class="btn">Generate Random</button>
                        <button id="build-tree" class="btn">Build BST</button>
                    </div>
                </div>
            </div>

            <div class="results">
                <h2>Traversal Results</h2>
                <div class="traversal-container">
                    <div class="traversal-box">
                        <h3>Post-Order (LRT)</h3>
                        <div id="postOrder" class="traversal-result"></div>
                    </div>
                    <div class="traversal-box">
                        <h3>Pre-Order (TLR)</h3>
                        <div id="preOrder" class="traversal-result"></div>
                    </div>
                    <div class="traversal-box">
                        <h3>In-Order (LTR)</h3>
                        <div id="inOrder" class="traversal-result"></div>
                    </div>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path class="sun" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        <path class="moon" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.25.0/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
